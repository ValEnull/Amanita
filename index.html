</html><!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        input[type="password"] {
            padding: 12px 20px;
            font-size: 16px;
            border: 1px solid #333;
            background-color: rgb(60, 59, 59);
            color: #fff;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: #555;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            background-color: #a20b6b;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="password" id="passwordField" placeholder="">
        <button onclick="checkPassword()">VAI</button>
    </div>

    <script>
        function checkPassword() {
            const passwordInserita = document.getElementById('passwordField').value;
            
            // Inserisci il tuo link di Google Drive tra le virgolette qui sotto
            const linkDrive = "https://drive.google.com/drive/folders/1GaoyrX-YoYyG_27F95VOQeeq3gKK4JYB?usp=sharing";

            if (passwordInserita === "AMANITA") {
                window.location.href = linkDrive;
            } else {
                alert("Password errata");
            }
        }

        // Permette di premere il tasto Invio sulla tastiera per inviare la password
        document.getElementById('passwordField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>

</body>
</html>
